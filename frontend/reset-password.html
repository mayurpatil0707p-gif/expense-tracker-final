<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SmartTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 12px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
        }
        .floating-input {
            position: relative;
            margin-bottom: 24px;
        }
        .floating-input i {
            position: absolute;
            left: 16px;
            bottom: 16px;
            color: #667eea;
        }
        .floating-input input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            font-size: 15px;
            color: white;
        }
        .floating-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .floating-input label {
            position: absolute;
            left: 48px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
            pointer-events: none;
        }
        .floating-input input:focus ~ label,
        .floating-input input:not(:placeholder-shown) ~ label {
            top: -10px;
            left: 16px;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 0 6px;
            border-radius: 10px;
            color: #667eea;
        }
        .btn-gradient {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        .back-link {
            text-align: center;
            margin-top: 24px;
            display: block;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }
        .back-link:hover { color: #667eea; }
        .message {
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
        }
        .success { background: rgba(16,185,129,0.2); color: #10b981; }
        .error { background: rgba(239,68,68,0.2); color: #ef4444; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Reset Password</h2>
        <div class="subtitle">Create a new password</div>
        <div id="message" class="message"></div>
        <div class="floating-input">
            <i class="fas fa-lock"></i>
            <input type="password" id="newPassword" placeholder=" ">
            <label>New Password</label>
        </div>
        <div class="floating-input">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" placeholder=" ">
            <label>Confirm Password</label>
        </div>
        <button class="btn-gradient" onclick="resetPassword()">Reset Password</button>
        <a href="index.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (!newPassword || !confirmPassword) return showMessage('Please fill all fields', 'error');
            if (newPassword !== confirmPassword) return showMessage('Passwords do not match', 'error');
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('Password reset successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Error connecting to server', 'error');
            }
        }
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.className = `message ${type}`;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
