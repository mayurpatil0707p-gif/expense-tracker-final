<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Expense Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle { color: #64748b; margin-bottom: 32px; }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 16px;
            bottom: 14px;
            color: #667eea;
        }
        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #667eea;
            text-decoration: none;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
        .success { background: #d1fae5; color: #10b981; }
        .error { background: #fee2e2; color: #ef4444; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h2>Reset Password</h2>
        <div class="subtitle">Create a new password</div>
        <div id="message" class="message"></div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="newPassword" placeholder="New Password">
        </div>
        <div class="input-group">
            <i class="fas fa-check-circle"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm Password">
        </div>
        <button class="btn" onclick="resetPassword()">Reset Password</button>
        <a href="index.html" class="back-link">← Back to Login</a>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (!newPassword || !confirmPassword) return showMessage('Please fill all fields', 'error');
            if (newPassword !== confirmPassword) return showMessage('Passwords do not match', 'error');
            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    showMessage('Password reset successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showMessage(data.error, 'error');
                }
            } catch (error) {
                showMessage('Error connecting to server', 'error');
            }
        }
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.className = `message ${type}`;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
