<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFinance - Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-box {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .auth-box h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); }
        .auth-link { text-align: center; margin-top: 20px; }
        .auth-link a { color: #667eea; text-decoration: none; }
        .error-message, .success-message {
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message { background: #f5576c; color: white; }
        .success-message { background: #4caf50; color: white; }
        .dashboard { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .balance-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
        }
        .balance-amount { font-size: 48px; font-weight: bold; margin: 15px 0; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .count { font-size: 32px; font-weight: bold; }
        .add-transaction {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .transactions-list {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 25px;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        .income-amount { color: #4caf50; }
        .expense-amount { color: #ff6b6b; }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
        }
        .logout-btn {
            background: #dc3545;
            width: auto;
            padding: 8px 20px;
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .transaction-item { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>
    <div id="authSection">
        <div class="auth-container">
            <div class="auth-box">
                <h2 id="authTitle">SmartFinance</h2>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                <form id="authForm">
                    <div id="nameField" style="display: none;">
                        <div class="input-group">
                            <input type="text" id="name" placeholder="Full Name">
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div id="phoneField" style="display: none;">
                        <div class="input-group">
                            <input type="tel" id="phone" placeholder="Phone (Optional)">
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Login</button>
                </form>
                <div class="auth-link">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <div class="auth-link">
                    <span id="toggleText">Don't have an account?</span>
                    <a href="#" id="toggleLink">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="header">
            <h1>💰 SmartFinance</h1>
            <button class="btn logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="balance-card">
            <h3>Total Balance</h3>
            <div class="balance-amount" id="totalBalance">₹0</div>
            <div class="balance-stats">
                <div>Income: ₹<span id="totalIncome">0</span></div>
                <div>Expense: ₹<span id="totalExpense">0</span></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card"><i class="fas fa-chart-line"></i><h3>Income</h3><div class="count" id="incomeCount">0</div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><h3>Expense</h3><div class="count" id="expenseCount">0</div></div>
            <div class="stat-card"><i class="fas fa-exchange-alt"></i><h3>Total</h3><div class="count" id="totalCount">0</div></div>
        </div>

        <div class="add-transaction">
            <h3>Add Transaction</h3>
            <form id="transactionForm">
                <div class="form-row">
                    <input type="number" id="amount" placeholder="Amount" required>
                    <select id="type" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Salary">Salary</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Bills">Bills</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="description" placeholder="Description" required>
                    <input type="date" id="date">
                </div>
                <button type="submit" class="btn" style="margin-top: 15px;">Add Transaction</button>
            </form>
        </div>

        <div class="transactions-list">
            <h3>Recent Transactions</h3>
            <div id="transactionsContainer">Loading...</div>
        </div>
    </div>

    <div id="forgotModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:20px; width:90%; max-width:400px;">
            <h3>Forgot Password</h3>
            <input type="email" id="resetEmail" placeholder="Enter your email" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd;">
            <button onclick="sendResetLink()" class="btn">Send Reset Link</button>
            <button onclick="closeForgotModal()" class="btn" style="background:#dc3545; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let authToken = localStorage.getItem('token');
        let allTransactions = [];

        if (authToken) loadDashboard();

        document.getElementById('toggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            const isLogin = document.getElementById('nameField').style.display === 'none';
            if (isLogin) {
                document.getElementById('authTitle').innerHTML = 'Create Account';
                document.getElementById('submitBtn').innerHTML = 'Register';
                document.getElementById('toggleText').innerHTML = 'Already have an account?';
                document.getElementById('toggleLink').innerHTML = 'Login';
                document.getElementById('nameField').style.display = 'block';
                document.getElementById('phoneField').style.display = 'block';
            } else {
                document.getElementById('authTitle').innerHTML = 'SmartFinance';
                document.getElementById('submitBtn').innerHTML = 'Login';
                document.getElementById('toggleText').innerHTML = "Don't have an account?";
                document.getElementById('toggleLink').innerHTML = 'Create Account';
                document.getElementById('nameField').style.display = 'none';
                document.getElementById('phoneField').style.display = 'none';
            }
        });

        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('forgotModal').style.display = 'flex';
        });

        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }

        async function sendResetLink() {
            const email = document.getElementById('resetEmail').value;
            if (!email) return showError('Enter email');
            try {
                const res = await fetch(API_URL + '/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    showSuccess('Reset link sent to your email!');
                    closeForgotModal();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Error sending reset link');
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let body = { email, password };
            
            const isRegister = document.getElementById('nameField').style.display === 'block';
            if (isRegister) {
                body.name = document.getElementById('name').value;
                body.phone = document.getElementById('phone').value;
                if (!body.name) return showError('Enter name');
            }
            
            const endpoint = isRegister ? '/auth/register' : '/auth/login';
            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userEmail', data.user.email);
                    authToken = data.token;
                    loadDashboard();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Server error. Make sure backend is running!');
            }
        });

        async function loadDashboard() {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            await loadTransactions();
        }

        async function loadTransactions() {
            try {
                const res = await fetch(API_URL + '/transactions', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                allTransactions = await res.json();
                displayTransactions(allTransactions);
                updateStats(allTransactions);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayTransactions(transactions) {
            const container = document.getElementById('transactionsContainer');
            if (transactions.length === 0) {
                container.innerHTML = '<div class="empty-message">No transactions yet. Add your first transaction!</div>';
                return;
            }
            container.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div>
                        <div><strong>${t.description}</strong></div>
                        <div>${t.category}</div>
                        <div>${new Date(t.date).toLocaleDateString()}</div>
                    </div>
                    <div class="${t.type === 'income' ? 'income-amount' : 'expense-amount'}">
                        ${t.type === 'income' ? '+' : '-'}₹${t.amount}
                    </div>
                    <button class="delete-btn" onclick="deleteTransaction('${t.id}')">Delete</button>
                </div>
            `).join('');
        }

        function updateStats(transactions) {
            let totalIncome = 0, totalExpense = 0, incomeCount = 0, expenseCount = 0;
            transactions.forEach(t => {
                if (t.type === 'income') {
                    totalIncome += t.amount;
                    incomeCount++;
                } else {
                    totalExpense += t.amount;
                    expenseCount++;
                }
            });
            const balance = totalIncome - totalExpense;
            document.getElementById('totalBalance').innerHTML = `₹${balance.toFixed(2)}`;
            document.getElementById('totalIncome').innerHTML = totalIncome.toFixed(2);
            document.getElementById('totalExpense').innerHTML = totalExpense.toFixed(2);
            document.getElementById('incomeCount').innerHTML = incomeCount;
            document.getElementById('expenseCount').innerHTML = expenseCount;
            document.getElementById('totalCount').innerHTML = transactions.length;
        }

        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const transaction = {
                amount: parseFloat(document.getElementById('amount').value),
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value,
                date: document.getElementById('date').value || new Date().toISOString().split('T')[0]
            };
            if (!transaction.amount || !transaction.category || !transaction.description) return showError('Fill all fields');
            
            const res = await fetch(API_URL + '/transactions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`
                },
                body: JSON.stringify(transaction)
            });
            if (res.ok) {
                document.getElementById('transactionForm').reset();
                await loadTransactions();
                showSuccess('Transaction added!');
            }
        });

        async function deleteTransaction(id) {
            if (confirm('Delete this transaction?')) {
                await fetch(API_URL + '/transactions/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                await loadTransactions();
                showSuccess('Deleted!');
            }
        }

        function showError(msg) {
            const div = document.getElementById('errorMessage');
            div.innerHTML = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            const div = document.getElementById('successMessage');
            div.innerHTML = msg;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 3000);
        }

        function logout() {
            localStorage.clear();
            authToken = null;
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('authForm').reset();
        }
    </script>
</body>
</html>
